<!DOCTYPE html>
<html lang="en">
<head> <!-- Template File for Website-->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Title | Spire Studios</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/x-icon" href="Lspire_v2.png" id="favicon">
    <script src="script.js"></script>
</head>
<body style="display: flex; flex-direction: column; min-height: 100vh; /* Viewport height */ margin: 0;">
    <!-- Navigation -->
    <nav class="glass-nav">
        <div class="nav-container">
            <div class="brand"><a href="https://www.spirestudios.org" style="text-decoration: none; color: inherit; display: flex;">
                <img src="Lspire_v2.png" alt="Spire Logo" class="nav-icon"></a>
                <a href="https://www.spirestudios.org" style="text-decoration: none; color: inherit; display: flex;">
                <span>SPIRE STUDIOS</span></a>
            </div>
            <ul class="nav-links">
                <li><a href="https://www.spirestudios.org/about" class="shortcut">ABOUT</a></li>
                <li><a href="https://www.spirestudios.org/devlog" class="shortcut">DEVLOG</a></li>
                <li><button class="contact-pill" id="contact-trigger">CONTACT</button></li>
            </ul>
        </div>
    </nav>


    <!-- Page content -->
    <section id="page_body" class="page-content" style="flex: 1; align-items: center; display: flex;">
        
    </section>

    <!-- Footer-->
    <footer style="flex-shrink: 0;">
        <div class="footer-bottom">
            <div style="display: flex; align-items: center;">
            <img src="spire_light.png" alt="Small Spire Icon" class="footer-mini-logo">
            <p>SPIRE STUDIOS</p></div>
            <div class="socials">
                <a href="#">X / TWITTER</a>
                <a href="https://www.youtube.com/@spirestudiosdev">YOUTUBE</a>
                <a href="#">LINKEDIN</a>
            </div>
        </div>
    </footer>

    <!-- Contact Modal -->
    <div id="contact-modal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2>Contact Us</h2>
            <p><strong>Email:</strong> developer@spirestudios.org</p>
            <p><strong>Social Media:</strong> Follow us on <a href="https://www.youtube.com/@spirestudiosdev" target="_blank">YouTube</a> and other platforms.</p>
        </div>
    </div>

</body>
</html>
