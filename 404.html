<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spire Studios</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/x-icon" href="Lspire_v2.png" id="favicon">
    <script src="script.js"></script>
</head>
<body style="display: flex; flex-direction: column; min-height: 100vh; /* Viewport height */ margin: 0;">

    <nav class="glass-nav">
        <div class="nav-container">
            <div class="brand">
                <img src="Lspire_v2.png" alt="Spire Logo" class="nav-icon">
                <span>SPIRE STUDIOS</span>
            </div>
            <ul class="nav-links">
                <li><a href="https://www.spirestudios.org/#projects" class="shortcut">PROJECTS</a></li>
                <li><a href="https://www.spirestudios.org/#studio" class="shortcut">STUDIO</a></li>
                <li><button class="contact-pill" id="contact-trigger">CONTACT</button></li>
            </ul>
        </div>
    </nav>



    <section id="studio" class="studio-culture" style="flex: 1; align-items: center; display: flex;">
        <div class="culture-grid" style="align-items: center; align-self: center; justify-content: center; gap: 400px;">
            <div class="culture-text">
                <h1>Page Not Found (404)</h1>
                <p>The requested page was not found on our servers.</p>
            </div>
            <div class="culture-image">
                <img src="mission_logo.png" alt="Spire Whiteout Logo" class="culture-logo-feature">
            </div>
        </div>
    </section>

    <footer style="flex-shrink: 0;">
        <div class="footer-bottom">
            <div style="display: flex; align-items: center;">
            <img src="spire_light.png" alt="Small Spire Icon" class="footer-mini-logo">
            <p>SPIRE STUDIOS</p></div>
            <div class="socials">
                <a href="#">X / TWITTER</a>
                <a href="https://www.youtube.com/@Spire-Studios-Official">YOUTUBE</a>
                <a href="#">LINKEDIN</a>
            </div>
        </div>
    </footer>

    <!-- Contact Modal -->
    <div id="contact-modal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2>Contact Us</h2>
            <p><strong>Email:</strong> developer@spirestudios.org</p>
            <p><strong>Social Media:</strong> Follow us on <a href="https://www.youtube.com/@Spire-Studios-Official" target="_blank">YouTube</a> and other platforms.</p>
        </div>
    </div>

</body>
</html>
